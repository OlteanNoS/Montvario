<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montvario Luxury Panel</title>
  

<style>
:root{
  --bg:#0a0807;
  --bg2:#120e0b;
  --panel:#17120f;
  --panel-2:#1f1814;
  --panel-3:#261d17;
  --line:#463426;
  --line-soft:rgba(214,180,139,.12);
  --text:#f6efe7;
  --muted:#c9b8a1;
  --brown:#8a6142;
  --brown-2:#a87a57;
  --gold:#e2c39a;
  --green:#2f6243;
  --red:#7b3131;
  --yellow:#7a6736;
  --blue:#365972;
  --shadow:0 22px 50px rgba(0,0,0,.38);
  --radius:20px;
}
*{box-sizing:border-box}
html,body{
  margin:0;padding:0;
  background:
    radial-gradient(circle at top, rgba(168,122,87,.12), transparent 28%),
    linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
  color:var(--text);
  font-family:Inter,Arial,sans-serif
}
body::-webkit-scrollbar,.modal::-webkit-scrollbar,.table-wrap::-webkit-scrollbar{height:12px;width:12px}
body::-webkit-scrollbar-thumb,.modal::-webkit-scrollbar-thumb,.table-wrap::-webkit-scrollbar-thumb{background:#584332;border-radius:999px;border:2px solid transparent;background-clip:padding-box}
body::-webkit-scrollbar-track,.modal::-webkit-scrollbar-track,.table-wrap::-webkit-scrollbar-track{background:#120f0d}
.container{max-width:1540px;margin:0 auto;padding:24px}
.topbar{
  display:flex;justify-content:space-between;align-items:flex-start;gap:18px;
  margin-bottom:18px;padding:18px 20px;
  background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));
  border:1px solid var(--line-soft);border-radius:24px;box-shadow:var(--shadow)
}
h1,h2,h3,p{margin:0}
h1{font-size:30px;letter-spacing:.02em}
h3{font-size:17px}
.subtitle{color:var(--muted);margin-top:8px;max-width:860px;line-height:1.45}
.btn{
  border:1px solid rgba(255,255,255,.06);
  background:linear-gradient(180deg,var(--brown-2),var(--brown));
  color:#fff;padding:11px 14px;border-radius:14px;font-weight:800;cursor:pointer;
  box-shadow:0 10px 24px rgba(0,0,0,.18);transition:.18s ease
}
.btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
.btn.secondary{background:linear-gradient(180deg,var(--panel-3),var(--panel-2));color:var(--text);border-color:var(--line-soft)}
.btn.ghost{background:transparent}
.btn.small{padding:7px 10px;border-radius:10px;font-size:12px}
.btn.red{background:linear-gradient(180deg,#8d3f3f,#6f2d2d)}
.tabs{
  display:grid;grid-template-columns:repeat(7,1fr);gap:8px;
  background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.015));
  border:1px solid var(--line-soft);padding:8px;border-radius:20px;margin-bottom:18px
}
.tab-btn{
  background:transparent;color:var(--muted);border:none;border-radius:12px;
  padding:11px 8px;font-weight:800;cursor:pointer;transition:.16s ease
}
.tab-btn:hover{background:rgba(255,255,255,.03);color:var(--text)}
.tab-btn.active{
  background:linear-gradient(180deg,#2a221c,#211a15);color:var(--text);
  border:1px solid rgba(226,195,154,.14);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04)
}
.tab,.tab-content{display:none}
.tab.active,.tab-content.active{display:block}
.grid{display:grid;gap:16px}
.grid.cards-2,.g2{grid-template-columns:repeat(2,1fr)}
.grid.cards-3,.g3{grid-template-columns:repeat(3,1fr)}
.grid.cards-4,.g4{grid-template-columns:repeat(4,1fr)}
.grid.cards-5,.g5{grid-template-columns:repeat(5,1fr)}
.card{
  background:linear-gradient(180deg,var(--panel) 0%,#120f0d 100%);
  border:1px solid var(--line-soft);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px
}
.card > h3:first-child{margin-bottom:12px}
.metric{font-size:32px;font-weight:900;letter-spacing:.01em;line-height:1.05}
.muted{color:var(--muted)!important}
.notice{color:#d9c7b1;font-size:12px;font-weight:800}
.table-wrap{
  overflow:auto;border:1px solid var(--line-soft);border-radius:18px;background:linear-gradient(180deg,#16120f,#120f0d)
}
table{width:100%;border-collapse:separate;border-spacing:0;min-width:1400px}
th,td{
  padding:10px 10px;text-align:left;border-bottom:1px solid rgba(214,180,139,.08);
  font-size:13px;vertical-align:middle
}
th{
  position:sticky;top:0;background:#1b1511;color:#ead7bf;
  font-size:12px;letter-spacing:.03em;z-index:1
}
tbody tr:nth-child(even) td{background:rgba(255,255,255,.012)}
tr:hover td{background:rgba(214,180,139,.045)}
.controls{display:flex;gap:10px;flex-wrap:wrap}
.row-between{display:flex;justify-content:space-between;align-items:center;gap:12px}
.stack,.criteria-list,.history-list{display:grid;gap:10px}
input,select,textarea{
  width:100%;background:#171310;border:1px solid var(--line-soft);border-radius:12px;
  padding:10px 11px;color:var(--text);font:inherit;transition:border-color .15s ease, box-shadow .15s ease
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:rgba(226,195,154,.38);box-shadow:0 0 0 3px rgba(226,195,154,.08)
}
textarea{min-height:70px;resize:vertical}
.field{display:grid;gap:6px}
.field label{font-size:13px;font-weight:800;color:#e8d5bf}
.badge{
  display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;
  font-size:11px;font-weight:800;border:1px solid rgba(255,255,255,.05)
}
.badge.success,.badge.ok{background:rgba(72,122,91,.22);color:#d2e9d8}
.badge.warning,.badge.warn{background:rgba(119,98,54,.28);color:#f0dfaf}
.badge.danger,.badge.bad{background:rgba(111,45,45,.24);color:#f0c2c2}
.badge.info{background:rgba(49,79,99,.24);color:#cfe4ef}
.rank-chip{
  display:inline-flex;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:900;
  border:1px solid rgba(255,255,255,.05)
}
.rank-Made_Man{background:#4a3826}
.rank-Asociat{background:#3f3125}
.rank-Manager{background:#382b21}
.rank-Supervizor{background:#30261f}
.rank-Sef_de_tura{background:#291f1a}
.sep td,.rank-separator td{padding:6px 10px;border-bottom:none;background:transparent}
.sep-line{
  display:flex;align-items:center;gap:10px;color:#b69575;font-size:10px;font-weight:900;
  text-transform:uppercase;letter-spacing:.08em
}
.sep-line::before,.sep-line::after{content:"";flex:1;height:1px;background:rgba(214,180,139,.15)}
.kpi,.criteria-item{
  display:flex;justify-content:space-between;gap:10px;padding:11px 12px;
  border:1px solid var(--line-soft);border-radius:13px;
  background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.012))
}
.mini,.mini-card{
  border:1px solid var(--line-soft);border-radius:14px;padding:12px;
  background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.012))
}
.inline-badges{display:flex;gap:6px;flex-wrap:wrap}
.hint{font-size:12px;color:var(--muted);line-height:1.4}
.compact th,.compact td{padding:9px 9px}
.modal-root{position:fixed;inset:0;pointer-events:none;z-index:1000}
.modal-root.active{pointer-events:auto}
.modal-backdrop,.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);
  display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow:auto
}
.modal{
  position:relative;left:auto;top:auto;transform:none;
  width:min(1100px,100%);max-height:none;overflow:visible;
  background:linear-gradient(180deg,#191410 0%,#110e0c 100%);
  border:1px solid var(--line-soft);border-radius:24px;
  box-shadow:var(--shadow);padding:20px;margin:auto 0
}
.modal-head{
  display:flex;justify-content:space-between;gap:12px;align-items:center;
  margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(214,180,139,.1)
}
.close-x{background:transparent;border:none;color:var(--muted);font-size:24px;cursor:pointer}
.week-box{
  display:flex;justify-content:space-between;gap:12px;align-items:center;
  padding:11px 12px;border:1px solid var(--line-soft);border-radius:14px;
  background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01))
}
.profile-grid,.doc-grid,.activity-grid{display:grid;gap:16px}
.profile-grid{grid-template-columns:repeat(3,1fr)}
doc-grid{grid-template-columns:repeat(4,1fr)}
.activity-grid{grid-template-columns:1.12fr .88fr}
.checkbox-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.check{
  display:flex;align-items:center;gap:10px;border:1px solid var(--line-soft);
  padding:12px;border-radius:14px;background:rgba(255,255,255,.02)
}
.member-editor-panel{
  margin-top:18px;border:1px solid var(--line-soft);border-radius:16px;padding:18px;
  background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01))
}
.member-actions{display:flex;gap:8px;flex-wrap:wrap}
.activity-row{display:grid;grid-template-columns:2fr .8fr .9fr 2.2fr auto;gap:10px;align-items:end;margin-bottom:10px}
.hr{height:1px;background:rgba(214,180,139,.12);margin:14px 0}
.toolbar{
  display:flex;justify-content:space-between;gap:14px;align-items:center;flex-wrap:wrap;
  margin-bottom:14px;padding:12px 14px;border-radius:18px;border:1px solid var(--line-soft);
  background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.01))
}
.pill{
  display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;
  border:1px solid var(--line-soft);background:rgba(255,255,255,.02);font-size:11px;font-weight:800;color:#e9d8c2
}
.icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:999px;background:rgba(226,195,154,.08);border:1px solid rgba(226,195,154,.12);font-size:10px;line-height:1;color:var(--gold);margin-right:6px;vertical-align:middle}
.sort-btn{background:transparent;border:none;color:#ead7bf;font:inherit;font-weight:800;cursor:pointer;padding:0}
.sort-btn:hover{color:#fff}
.export-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.toast-root{
  position:fixed; right:18px; bottom:18px; z-index:1200;
  display:grid; gap:10px; pointer-events:none;
}
.toast{
  min-width:280px; max-width:360px;
  padding:12px 14px; border-radius:14px;
  background:linear-gradient(180deg,#1f1814,#17120f);
  border:1px solid rgba(226,195,154,.16);
  color:var(--text); box-shadow:var(--shadow);
  font-size:13px; font-weight:700; line-height:1.4;
  transform:translateY(8px); opacity:0; animation:toastIn .18s ease forwards;
}
.toast.success{border-color:rgba(72,122,91,.35)}
.toast.warn{border-color:rgba(119,98,54,.35)}
.toast.bad{border-color:rgba(111,45,45,.35)}
@keyframes toastIn{to{transform:translateY(0);opacity:1}}
.member-row-eligible td{box-shadow:inset 3px 0 0 rgba(72,122,91,.55)}
.member-row-warning td{box-shadow:inset 3px 0 0 rgba(119,98,54,.55)}
.member-row-danger td{box-shadow:inset 3px 0 0 rgba(111,45,45,.55)}
.modal-grid-2{display:grid;grid-template-columns:1.35fr .65fr;gap:16px}
.modal-side .kpi{margin-bottom:10px}
.modal-footer{
  position:sticky; bottom:-20px; margin:16px -20px -20px -20px; padding:14px 20px;
  background:linear-gradient(180deg,rgba(17,14,12,.2),#120f0d 36%);
  border-top:1px solid rgba(214,180,139,.12);
  display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;
}
.top-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.top-card{padding:14px;border-radius:16px;border:1px solid var(--line-soft);background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.01))}
.top-card h4{margin:0 0 10px 0;font-size:13px;color:#e9d8c2;letter-spacing:.02em}
.top-item{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid rgba(214,180,139,.08);font-size:13px}
.top-item:first-child{border-top:none;padding-top:0}
.doc-section{margin-top:18px;border:1px solid rgba(214,180,139,.10);border-radius:18px;padding:16px;background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01))}
.doc-section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.doc-actions{display:flex;gap:8px;flex-wrap:wrap}
.doc-check-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.doc-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.doc-pill{padding:10px 12px;border-radius:12px;border:1px solid rgba(214,180,139,.10);background:rgba(255,255,255,.02);font-size:12px;font-weight:700}
@media (max-width:1100px){.grid.cards-5,.grid.cards-4,.grid.cards-3,.grid.cards-2,.g2,.g3,.g4,.g5,.checkbox-grid,.doc-grid,.profile-grid,.activity-grid,.activity-row,.modal-grid-2,.top-grid,.doc-check-grid,.doc-summary{grid-template-columns:1fr}
  .tabs{grid-template-columns:repeat(2,1fr)}
  .topbar{flex-direction:column}
}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1>Montvario Luxury Panel</h1>
      <p class="subtitle">Variantă refăcută curat: membri, activități, 4 săptămâni manuale și eligibilitate pe ultima avansare.</p>
    </div>
    <div class="controls">
      <button class="btn" id="openAddMember">Adaugă membru</button>
      <button class="btn secondary" id="exportCsv">Export CSV</button>
      <button class="btn secondary" id="exportMeetingCsv">Export ședință</button>
      <button class="btn secondary" id="resetDemo">Reset demo</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="members">Registru membri</button>
    <button class="tab-btn" data-tab="activities">Activități</button>
    <button class="tab-btn" data-tab="points">Evidență puncte</button>
    <button class="tab-btn" data-tab="promotions">Promovări</button>
    <button class="tab-btn" data-tab="profile">Fișă membru</button>
    <button class="tab-btn" data-tab="guide">Ghid</button>
  </div>

  <section id="dashboard" class="tab active"></section>
  <section id="members" class="tab"></section>
  <section id="activities" class="tab"></section>
  <section id="points" class="tab"></section>
  <section id="promotions" class="tab"></section>
  <section id="profile" class="tab"></section>
  <section id="guide" class="tab"></section>
</div>

<div id="modalRoot" class="modal-root"></div>
<div id="toastRoot" class="toast-root"></div>

<script>
const RANKS=["Șef de tură","Supervizor","Manager","Asociat","Made Man"];
const RANKS_DESC=[...RANKS].reverse();
const STATUSES=["Activ","Inactiv","În concediu","Suspendat"];

const PRESETS=[

  {label:"Răpire",category:"illegal",ppu:5,qty:1,description:"Răpire"},
  {label:"Contract",category:"contracts",ppu:2,qty:1,description:"Contract de livrare"},

  {label:"Eveniment",category:"events",ppu:1,qty:1,description:"Eveniment"},
  {label:"USB",category:"components",ppu:3,qty:1,description:"Stick USB"}
];
const GUIDE=[
  {rank:"Șef de tură",promotionTo:"Supervizor",requirements:["Minim 30P","Minim o săptămână de la ultima avansare","1 contract de livrare","Mașină HS","Cunoașterea zonei Industrială Sud","3 anunțuri de angajare"]},
  {rank:"Supervizor",promotionTo:"Manager",requirements:["Minim 30P","RF LS pe o mașină HS","2 contracte de livrare","2 săptămâni de la ultima avansare sau o săptămână cu 60P","1 armă mică","1 armă mare","1 angajare","3 anunțuri de angajare"]},

  {rank:"Made Man",promotionTo:null,requirements:["Loialitate totală","Activitate constantă","Minim făcut constant","Implicare","Seriozitate"]}

  return [
    {id:1,start:"2026-03-08",end:"2026-03-15",label:"08.03.2026 - 15.03.2026"},
    {id:2,start:"2026-03-01",end:"2026-03-08",label:"01.03.2026 - 08.03.2026"},
    {id:3,start:"2026-02-22",end:"2026-03-01",label:"22.02.2026 - 01.03.2026"},
    {id:4,start:"2026-02-15",end:"2026-02-22",label:"15.02.2026 - 22.02.2026"}
  ];
}
const DEMO_MEMBERS=[
  {id:1,nickname:"Raven",name:"Mihai Popescu",rank:"Șef de tură",status:"Activ",cnp:"1980101123456",phone:"0712000111",carNumber:"B-99-MTV",hireDate:"2026-02-20",lastPromotion:"2026-02-20",bulletinUrl:"",mentor:"Viper",hs:true,pilot:false,rfLs:false,elicopterLs:false,heli:false,pilotHs:false,knowsIndustrialSouth:true,locationCertificate:false,gunnerCertificate:false,smallWeapons:1,bigWeapons:0,bankBalance:450000,notes:""},
  {id:2,nickname:"Viper",name:"Andrei Ionescu",rank:"Manager",status:"Activ",cnp:"1970202123456",phone:"0722111222",carNumber:"B-11-MTV",hireDate:"2025-12-10",lastPromotion:"2026-02-01",bulletinUrl:"",mentor:"Belvarro",hs:true,pilot:true,rfLs:true,elicopterLs:false,heli:true,pilotHs:true,knowsIndustrialSouth:true,locationCertificate:true,gunnerCertificate:false,smallWeapons:2,bigWeapons:2,bankBalance:1350000,notes:""},
  {id:3,nickname:"Ghost",name:"Robert Marin",rank:"Asociat",status:"Activ",cnp:"1960612123456",phone:"0733444555",carNumber:"B-77-MTV",hireDate:"2025-11-15",lastPromotion:"2026-01-28",bulletinUrl:"",mentor:"Belvarro",hs:true,pilot:true,rfLs:true,elicopterLs:true,heli:true,pilotHs:true,knowsIndustrialSouth:true,locationCertificate:true,gunnerCertificate:true,smallWeapons:3,bigWeapons:3,bankBalance:2450000,notes:""}

let weeks=loadData("mv_weeks_final_clean", defaultWeeks());
let members=loadData("mv_members_final_clean", DEMO_MEMBERS);
let activities=loadData("mv_activities_final_clean", demoActivities(weeks));

let memberSearch="";

function saveAll(){

function addHistory(type,message,memberId=null,meta={}){
  historyLog.unshift({
    id:historyLog.length?Math.max(...historyLog.map(x=>x.id))+1:1,
    type,message,memberId,meta,createdAt:new Date().toISOString()
  });
  if(historyLog.length>600) historyLog=historyLog.slice(0,600);
}

function memberHistory(memberId, limit=12){
  return historyLog.filter(h=>h.memberId===memberId).slice(0,limit);
}

function fmtDateTime(iso){
  try{return new Date(iso).toLocaleString("ro-RO")}catch(e){return iso||""}
}
function loadData(key,fallback){try{const raw=localStorage.getItem(key); if(raw){const data=JSON.parse(raw); if(Array.isArray(data)) return data;}}catch(e){} return JSON.parse(JSON.stringify(fallback))}
function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function num(v){const n=Number(v); return Number.isNaN(n)?0:n}
function weekById(id){return weeks.find(w=>w.id===id)||null}
function currentWeek(){return weeks[0]||null}
function formatRO(iso){if(!iso) return ""; const p=iso.split("-"); return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:iso}
function intervalLabel(s,e){return `${formatRO(s)} - ${formatRO(e)}`}
function nextId(arr){return arr.length?Math.max(...arr.map(x=>x.id))+1:1}
function safeRankClass(rank){return rank.replaceAll(" ","_").replaceAll("Ș","S").replaceAll("ș","s").replaceAll("ă","a").replaceAll("â","a").replaceAll("ț","t").replaceAll("Ț","T")}
function orderedMembers(){

function memberById(id){return members.find(m=>m.id===id)||null}
function memberWeekEntries(memberId, weekId){return activities.filter(a=>a.memberId===memberId&&a.weekId===weekId)}
function statsForWeeks(memberId, weekIds){
  const out={points:{announcements:0,recruit:0,contracts:0,illegal:0,ls:0,cayo:0,events:0,components:0,total:0},
             counts:{announcements:0,recruit:0,contracts:0,illegal:0,ls:0,cayo:0,events:0,components:0,total:0}};
  activities.filter(a=>a.memberId===memberId&&weekIds.includes(a.weekId)).forEach(a=>{
    out.points[a.category]+=num(a.points);
    out.points.total+=num(a.points);
    out.counts[a.category]+=num(a.qty||1);
    out.counts.total+=num(a.qty||1);
  });
  return out;
}
function currentStats(memberId){return statsForWeeks(memberId,[weeks[0]?.id].filter(Boolean))}
function prevStats(memberId){return statsForWeeks(memberId,[weeks[1]?.id].filter(Boolean))}
function lastTwoStats(memberId){return statsForWeeks(memberId,weeks.slice(0,2).map(w=>w.id))}
function lastThreeStats(memberId){return statsForWeeks(memberId,weeks.slice(0,3).map(w=>w.id))}
function weeksSinceLastPromotion(member){
  if(!member.lastPromotion) return 0;
  const d=new Date(member.lastPromotion);
  if(Number.isNaN(d.getTime())) return 0;
  const diff=Date.now()-d.getTime();
  return diff>0 ? diff/(1000*60*60*24*7) : 0;
}
function criteria(member){
  const cur=currentStats(member.id), prev=prevStats(member.id), two=lastTwoStats(member.id), three=lastThreeStats(member.id), since=weeksSinceLastPromotion(member);
  const rows=[]; const push=(label,ok)=>rows.push({label,ok});
  push("Minim 30P",cur.points.total>=30);
  if(member.rank==="Șef de tură"){
    push("Minim o săptămână de la ultima avansare",since>=1);
    push("1 contract de livrare",cur.counts.contracts>=1);
    push("Mașină HS",!!member.hs);
    push("Cunoașterea zonei Industrială Sud",!!member.knowsIndustrialSouth);
    push("3 anunțuri de angajare",cur.counts.announcements>=3);
  }
  if(member.rank==="Supervizor"){
    push("RF LS pe o mașină HS",!!member.rfLs);
    push("2 contracte de livrare",cur.counts.contracts>=2);
    push("2 săptămâni de la ultima avansare sau o săptămână cu 60P",since>=2||prev.points.total>=60);
    push("1 armă mică",num(member.smallWeapons)>=1);
    push("1 armă mare",num(member.bigWeapons)>=1);
    push("1 angajare",cur.counts.recruit>=1);
    push("3 anunțuri de angajare",cur.counts.announcements>=3);
  }
  if(member.rank==="Manager"){
    push("Certificat locații",!!member.locationCertificate);
    push("Licență Heli",!!member.heli);
    push("2 acțiuni ilegale în ultimele 2 săptămâni",two.counts.illegal>=2);
    push("80P sau 2 săptămâni consecutive cu minimul",cur.points.total>=80||(cur.points.total>=30&&prev.points.total>=30));
    push("6 contracte de livrare",cur.counts.contracts>=6);
    push("2 arme mici",num(member.smallWeapons)>=2);
    push("2 arme mari",num(member.bigWeapons)>=2);
    push("Licență Pilot HS",!!member.pilotHs);
    push("1M în bancă",num(member.bankBalance)>=1000000);
    push("3 angajări",cur.counts.recruit>=3);
    push("3 anunțuri",cur.counts.announcements>=3);
    push("RF pe o mașină extreme",!!member.rfLs);
  }
  if(member.rank==="Asociat"){
    push("5 arme totale (2 mici + 3 mari)",num(member.smallWeapons)>=2&&num(member.bigWeapons)>=3);
    push("Certificat Gunner",!!member.gunnerCertificate);
    push("2M în bancă",num(member.bankBalance)>=2000000);
    push("Elicopter LS",!!member.elicopterLs);
    push("4 acțiuni ilegale în ultimele 3 săptămâni",three.counts.illegal>=4);
    push("3 angajări",cur.counts.recruit>=3);
    push("3 săptămâni de la ultima avansare sau 2 săptămâni cu 70P",since>=3||(cur.points.total>=70&&prev.points.total>=70));
  }
  return rows;
}
function promotionStatus(member){
  const next=RANKS[RANKS.indexOf(member.rank)+1];
  if(!next) return {status:"Top",missing:[],reason:"Rang maxim"};
  const rows=criteria(member), missing=rows.filter(r=>!r.ok).map(r=>r.label), currentWeek=currentStats(member.id).points.total;
  if(missing.length===0){
    return {status:"Eligibil",missing:[],reason:"Toate condițiile îndeplinite"};
  }
  return {status:currentWeek>=30?"Lipsesc condiții":"Neeligibil",missing,reason:missing.join(" • ")};
}
function docsMissing(member){
  const arr=[];
  if(!member.bulletinUrl) arr.push("Buletin");
  if(!member.hs) arr.push("HS");
  if(member.rank!=="Șef de tură"&&!member.pilot) arr.push("Pilot");
  return arr;
}
function statusBadge(s,title=""){
  const t=title?` title="${esc(title)}"`:"";
  if(s==="Eligibil") return `<span class="badge ok"${t}>Eligibil</span>`;
  if(s==="Lipsesc condiții") return `<span class="badge warn"${t}>Lipsesc condiții</span>`;
  if(s==="Neeligibil") return `<span class="badge bad"${t}>Neeligibil</span>`;
  if(s==="Top") return `<span class="badge info"${t}>Top rank</span>`;
  return `<span class="badge info"${t}>${esc(s)}</span>`;
}
function issueBadges(member){
  const promo=promotionStatus(member);
  const docs=docsMissing(member);
  const cur=currentStats(member.id).points.total;
  let out=[statusBadge(member.status)];
  out.push(statusBadge(promo.status,promo.reason));
  if(cur<30) out.push(`<span class="badge bad" title="Sub minimul de 30P">Sub minim</span>`);
  if(cur===0) out.push(`<span class="badge bad" title="Nu are activitate în săptămâna curentă">Fără activitate</span>`);
  if(docs.length) out.push(`<span class="badge warn" title="${esc(docs.join(' • '))}">Acte lipsă</span>`);
  return out.join("");
}

    document.getElementById("archiveWeek").onclick=()=>{

    };
  };

function exportMeetingCsv(){
  const headers=[["Porecla","Nume","Functia","StatusPromovare","Motive/Lipsuri","PuncteCurente","PunctePrecedente"]];
  const rows=orderedMembers().map(m=>{
    const promo=promotionStatus(m);
    return [m.nickname,m.name,m.rank,promo.status,promo.reason,currentStats(m.id).points.total,prevStats(m.id).points.total];
  });
  const csv=[...headers,...rows].map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="montvario_sedinta.csv";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),500);
  showToast("Exportul pentru ședință a fost generat.");
}

function sortedPointsMembers(){
  const rows=orderedMembers().map(m=>{
    const cur=currentStats(m.id), prev=prevStats(m.id), promo=promotionStatus(m);
    return {
      member:m,
      announcements:cur.points.announcements,
      recruit:cur.points.recruit,
      contracts:cur.points.contracts,
      illegal:cur.points.illegal,
      ls:cur.points.ls,
      cayo:cur.points.cayo,
      events:cur.points.events,
      components:cur.points.components,
      currentWeek:cur.points.total,
      previousWeek:prev.points.total,
      promo
    };
  });
  rows.sort((a,b)=>{
    const av=a[pointsSortKey], bv=b[pointsSortKey];
    const cmp=(typeof av==="string"?String(av).localeCompare(String(bv),"ro"): (av-bv));
    return pointsSortDir==="asc" ? cmp : -cmp;
  });
  return rows;
}

function showToast(message,type="success"){
  const root=document.getElementById("toastRoot");
  if(!root) return;
  const el=document.createElement("div");
  el.className=`toast ${type}`;
  el.textContent=message;
  root.appendChild(el);
  setTimeout(()=>{el.style.opacity="0"; el.style.transform="translateY(8px)";}, 2600);
  setTimeout(()=>el.remove(), 3000);
}
function memberRowClass(member){
  const promo=promotionStatus(member);
  const docs=docsMissing(member).length;
  const cur=currentStats(member.id).points.total;
  if(promo.status==="Eligibil") return "member-row-eligible";
  if(cur===0 || cur<30) return "member-row-danger";
  if(promo.status==="Lipsesc condiții" || docs) return "member-row-warning";
  return "";
}
function topMembersBy(fn, limit=5){
  return [...members].map(m=>({member:m,value:fn(m)})).sort((a,b)=>b.value-a.value).slice(0,limit);
}
function renderAll(){
  renderDashboard();
  renderMembers();
  renderActivities();
  renderPoints();
  renderPromotions();
  renderProfile();
  renderGuide();
}
document.getElementById("openAddMember").onclick=openAddMemberModal;
document.getElementById("resetDemo").onclick=()=>{weeks=defaultWeeks(); members=JSON.parse(JSON.stringify(DEMO_MEMBERS)); activities=demoActivities(weeks); historyLog=[]; selectedMemberId=members[0]?.id||1; memberSearch=""; rankFilter="all"; statusFilter="all"; bulkRows=[{category:"announcements",qty:1,ppu:1,description:""}]; saveAll(); renderAll(); showToast("Demo resetat.","warn");};
function exportMembersCsv(){
  const rows=[["Porecla","Nume","Functia","Status","PuncteCurente","PunctePrecedente","Eligibilitate","Telefon","CNP","Masina"]];
  orderedMembers().forEach(m=>{
    const cur=currentStats(m.id).points.total, prev=prevStats(m.id).points.total, promo=promotionStatus(m).status;
    rows.push([m.nickname,m.name,m.rank,m.status,cur,prev,promo,m.phone,m.cnp,m.carNumber]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="montvario_export.csv";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),500);
}
document.getElementById("exportCsv").onclick=exportMembersCsv;
document.getElementById("exportMeetingCsv").onclick=exportMeetingCsv;
renderAll();
</script>
