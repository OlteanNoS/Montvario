<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montvario Dashboard</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --green: #059669;
      --amber: #d97706;
      --blue: #2563eb;
      --red: #dc2626;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 24px; }
    .tag { display: inline-block; padding: 8px 12px; border-radius: 999px; background: #fff; border: 1px solid var(--border); color: var(--muted); font-size: 14px; margin-bottom: 12px; }
    h1 { margin: 0 0 8px; font-size: 34px; line-height: 1.1; }
    p.sub { margin: 0; color: var(--muted); max-width: 760px; }
    .actions, .filters { display: flex; gap: 10px; flex-wrap: wrap; }
    button, select, input { font: inherit; }
    button { border: 0; border-radius: 16px; padding: 12px 16px; cursor: pointer; font-weight: 600; }
    .btn-primary { background: var(--text); color: white; }
    .btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: white; color: var(--red); border: 1px solid #fecaca; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); }
    .stat { padding: 20px; }
    .stat-label { color: var(--muted); font-size: 14px; margin-bottom: 10px; }
    .stat-value { font-size: 34px; font-weight: 700; margin-bottom: 4px; }
    .stat-sub { color: var(--muted); font-size: 14px; }
    .tabs { display: flex; gap: 8px; padding: 8px; background: white; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 24px; flex-wrap: wrap; }
    .tab-btn { background: transparent; color: var(--muted); border: 0; padding: 12px 16px; border-radius: 14px; }
    .tab-btn.active { background: #eef2ff; color: #1e3a8a; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .grid-2 { display: grid; grid-template-columns: 1.4fr 0.9fr; gap: 20px; margin-bottom: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1.2fr 1.2fr 0.9fr; gap: 20px; }
    .section { padding: 20px; }
    .section h2 { margin: 0 0 6px; font-size: 22px; }
    .section .desc { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
    .member-box, .list-item, .req-box, .info-box, .form-grid > div { border: 1px solid var(--border); border-radius: 18px; padding: 14px; background: #fff; }
    .member-box + .member-box, .list-item + .list-item, .req-box + .req-box, .info-box + .info-box { margin-top: 12px; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .badge { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid var(--border); background: #fff; }
    .badge.ok { background: #ecfdf5; color: var(--green); border-color: #a7f3d0; }
    .badge.warn { background: #fffbeb; color: var(--amber); border-color: #fde68a; }
    .badge.dark { background: var(--text); color: white; border-color: var(--text); }
    .progress { width: 240px; max-width: 100%; height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .progress > span { display: block; height: 100%; background: linear-gradient(90deg, #2563eb, #38bdf8); border-radius: 999px; }
    .progress-wrap { min-width: 240px; }
    .small { color: var(--muted); font-size: 14px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: top; }
    th { color: var(--muted); background: #f8fafc; font-weight: 600; }
    tr:last-child td { border-bottom: 0; }
    input, select { border: 1px solid var(--border); border-radius: 14px; padding: 11px 12px; background: white; min-width: 180px; width: 100%; }
    .promo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .check-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 10px 12px; border: 1px solid var(--border); border-radius: 14px; margin-top: 8px; font-size: 14px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .form-grid label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .muted-box { padding: 12px 14px; border-radius: 16px; background: #f8fafc; border: 1px dashed var(--border); color: var(--muted); font-size: 14px; }
    .actions-inline { display:flex; gap:8px; flex-wrap:wrap; }

    @media (max-width: 1100px) {
      .stats, .grid-2, .grid-3, .promo-grid, .form-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .container { padding: 16px; }
      h1 { font-size: 28px; }
      .stat-value { font-size: 28px; }
      .progress-wrap { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <div class="tag">Panou Montvario</div>
        <h1>Dashboard puncte, membri și promovări</h1>
        <p class="sub">Varianta simplă într-un singur fișier <strong>index.html</strong>, cu adăugare membri și activități, plus salvare automată în browser prin localStorage.</p>
      </div>
      <div class="actions">
        <button class="btn-primary" id="goActivitiesBtn">Adaugă activitate</button>
        <button class="btn-secondary" id="goMembersBtn">Adaugă membru</button>
        <button class="btn-danger" id="resetDataBtn">Reset demo</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="membri">Membri</button>
      <button class="tab-btn" data-tab="promovari">Promovări</button>
      <button class="tab-btn" data-tab="activitati">Activități</button>
    </div>

    <div id="dashboard" class="tab-content active"></div>
    <div id="membri" class="tab-content"></div>
    <div id="promovari" class="tab-content"></div>
    <div id="activitati" class="tab-content"></div>
  </div>

  <script>
    const STORAGE_KEY = "montvario_dashboard_data_v2";

    const requirements = {
      "Șef de Tură": {
        next: "Supervizor",
        checks: [
          { key: "vechime", label: "Minim 1 săptămână", needed: 1, type: "number" },
          { key: "contracte", label: "1 contract de livrare", needed: 1, type: "number" },
          { key: "masinaHS", label: "Mașină HS", needed: true, type: "boolean" },
          { key: "zonaSud", label: "Cunoaștere Industrială Sud", needed: true, type: "boolean" },
          { key: "anunturi", label: "3 anunțuri angajare", needed: 3, type: "number" },
          { key: "propunereMentor", label: "Propunere mentor", needed: true, type: "boolean" },
        ],
      },
      "Supervizor": {
        next: "Manager",
        checks: [
          { key: "vechime", label: "2 săptămâni vechime", needed: 2, type: "number" },
          { key: "contracte", label: "2 contracte de livrare", needed: 2, type: "number" },
          { key: "armaMica", label: "1 armă calibru mic", needed: 1, type: "number" },
          { key: "armaMare", label: "1 armă calibru mare", needed: 1, type: "number" },
          { key: "angajari", label: "1 angajare", needed: 1, type: "number" },
          { key: "anunturi", label: "3 anunțuri angajare", needed: 3, type: "number" },
          { key: "rfLsHs", label: "RF LS pe mașină HS", needed: true, type: "boolean" },
        ],
      },
      "Manager": {
        next: "Asociat",
        checks: [
          { key: "contracte", label: "6 contracte de livrare", needed: 6, type: "number" },
          { key: "armaMica", label: "2 arme calibru mic", needed: 2, type: "number" },
          { key: "armaMare", label: "2 arme calibru mare", needed: 2, type: "number" },
          { key: "angajari", label: "3 angajări", needed: 3, type: "number" },
          { key: "anunturi", label: "3 anunțuri", needed: 3, type: "number" },
          { key: "banca", label: "1M în bancă", needed: 1000000, type: "number" },
          { key: "actiuniIlegale", label: "2 acțiuni ilegale", needed: 2, type: "number" },
          { key: "certificatLocatii", label: "Certificat locații", needed: true, type: "boolean" },
          { key: "licentaHeli", label: "Licență elicopter", needed: true, type: "boolean" },
          { key: "licentaPilotHS", label: "Licență pilot HS", needed: true, type: "boolean" },
          { key: "rfExtreme", label: "RF pe mașină extreme", needed: true, type: "boolean" },
          { key: "puncte", label: "Minim 80 puncte", needed: 80, type: "number" },
        ],
      },
      "Asociat": {
        next: "Made Man",
        checks: [
          { key: "armaMica", label: "2 Tec9 FULL", needed: 2, type: "number" },
          { key: "armaMare", label: "3 AK/Advanced FULL", needed: 3, type: "number" },
          { key: "banca", label: "2M în bancă", needed: 2000000, type: "number" },
          { key: "actiuniIlegale", label: "4 acțiuni ilegale", needed: 4, type: "number" },
          { key: "angajari", label: "3 angajări", needed: 3, type: "number" },
          { key: "vechime", label: "3 săptămâni vechime", needed: 3, type: "number" },
          { key: "certificatGunner", label: "Certificat Gunner", needed: true, type: "boolean" },
          { key: "elicopterLs", label: "Elicopter LS", needed: true, type: "boolean" },
          { key: "propunereBelvarro", label: "Propunere Belvarro", needed: true, type: "boolean" },
          { key: "seriozitate", label: "Seriozitate și implicare", needed: true, type: "boolean" },
        ],
      },
    };

    const pointsCatalog = [
      ["Anunț angajare", 1], ["Angajare - Caută", 5], ["Angajare - Servită", 1], ["Mineriadă", 2], ["Rafinare", 1],
      ["Contract livrare", 2], ["Răpire", 5], ["Jaf", 10], ["Activitate", 1], ["Organizare activitate", 2],
      ["Eveniment", 1], ["Activitate Cayo", 1], ["Prezență razie Cayo", 2], ["Oțel", 1], ["Sulf", 2]
    ].map(([name, points]) => ({ name, points }));

    function getDefaultData() {
      return {
        members: [
          { id: 1, name: "Andrei V.", rank: "Șef de Tură", vechime: 1, contracte: 2, masinaHS: true, zonaSud: true, anunturi: 4, propunereMentor: true, angajari: 0, armaMica: 0, armaMare: 0, banca: 200000, actiuniIlegale: 1, puncte: 24, rfLsHs: false },
          { id: 2, name: "Robert M.", rank: "Supervizor", vechime: 2, contracte: 3, anunturi: 3, angajari: 1, armaMica: 1, armaMare: 1, banca: 450000, actiuniIlegale: 2, puncte: 68, rfLsHs: true },
          { id: 3, name: "Mario C.", rank: "Manager", vechime: 3, contracte: 6, anunturi: 5, angajari: 3, armaMica: 2, armaMare: 2, banca: 1250000, actiuniIlegale: 3, puncte: 89, certificatLocatii: true, licentaHeli: true, licentaPilotHS: true, rfExtreme: true },
          { id: 4, name: "Sergiu L.", rank: "Asociat", vechime: 3, contracte: 8, anunturi: 3, angajari: 4, armaMica: 2, armaMare: 3, banca: 2100000, actiuniIlegale: 5, puncte: 104, certificatGunner: true, elicopterLs: true, propunereBelvarro: true, seriozitate: true },
          { id: 5, name: "Darius P.", rank: "Manager", vechime: 2, contracte: 4, anunturi: 2, angajari: 1, armaMica: 1, armaMare: 2, banca: 650000, actiuniIlegale: 1, puncte: 53, certificatLocatii: false, licentaHeli: true, licentaPilotHS: false, rfExtreme: false }
        ],
        logs: [
          { id: 1, date: "2026-03-03", week: 10, member: "Mario C.", activity: "Jaf", qty: 1, total: 10 },
          { id: 2, date: "2026-03-04", week: 10, member: "Robert M.", activity: "Contract livrare", qty: 2, total: 4 },
          { id: 3, date: "2026-03-05", week: 10, member: "Sergiu L.", activity: "Răpire", qty: 2, total: 10 },
          { id: 4, date: "2026-03-06", week: 10, member: "Andrei V.", activity: "Anunț angajare", qty: 3, total: 3 },
          { id: 5, date: "2026-03-08", week: 10, member: "Darius P.", activity: "Activitate", qty: 5, total: 5 },
          { id: 6, date: "2026-03-09", week: 11, member: "Mario C.", activity: "Jaf", qty: 1, total: 10 },
          { id: 7, date: "2026-03-09", week: 11, member: "Sergiu L.", activity: "Organizare activitate", qty: 2, total: 4 },
          { id: 8, date: "2026-03-09", week: 11, member: "Robert M.", activity: "Contract livrare", qty: 1, total: 2 }
        ]
      };
    }

    let state = loadState();

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try { return JSON.parse(saved); } catch (e) {}
      }
      return getDefaultData();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getPointsByActivity(name) {
      const found = pointsCatalog.find(item => item.name === name);
      return found ? found.points : 0;
    }

    function evaluateMember(member) {
      const req = requirements[member.rank];
      if (!req) return { next: "—", eligible: false, progress: 100, missing: [], checks: [] };
      const checks = req.checks.map(check => {
        const value = member[check.key];
        const ok = check.type === "boolean" ? Boolean(value) === check.needed : Number(value || 0) >= check.needed;
        return { ...check, ok, value: value ?? 0 };
      });
      const passed = checks.filter(c => c.ok).length;
      return {
        next: req.next,
        eligible: checks.every(c => c.ok),
        progress: Math.round((passed / checks.length) * 100),
        missing: checks.filter(c => !c.ok).map(c => c.label),
        checks,
      };
    }

    function getEnrichedMembers() {
      return state.members.map(m => ({ ...m, evaluation: evaluateMember(m) }));
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === tabId));
    }

    function renderStats() {
      const enriched = getEnrichedMembers();
      const eligibleCount = enriched.filter(m => m.evaluation.eligible).length;
      const atRiskCount = enriched.filter(m => (m.puncte || 0) < 40).length;
      const totalPoints = enriched.reduce((sum, m) => sum + Number(m.puncte || 0), 0);
      const data = [
        ["Membri activi", state.members.length, "toți membrii înregistrați"],
        ["Eligibili acum", eligibleCount, "pot fi analizați pentru avansare"],
        ["Sub minim", atRiskCount, "au nevoie de implicare mai mare"],
        ["Puncte totale", totalPoints, "puncte adunate de toți membrii"],
      ];
      document.getElementById("stats").innerHTML = data.map(([label, value, sub]) => `
        <div class="card stat">
          <div class="stat-label">${label}</div>
          <div class="stat-value">${value}</div>
          <div class="stat-sub">${sub}</div>
        </div>
      `).join("");
    }

    function renderDashboard() {
      const enriched = getEnrichedMembers();
      const latestWeek = state.logs.length ? Math.max(...state.logs.map(l => Number(l.week || 0))) : 0;
      const leaderboard = {};
      state.logs.filter(l => Number(l.week) === latestWeek).forEach(l => leaderboard[l.member] = (leaderboard[l.member] || 0) + Number(l.total || 0));
      const weekly = Object.entries(leaderboard).map(([name, total]) => ({ name, total })).sort((a,b) => b.total - a.total);

      document.getElementById("dashboard").innerHTML = `
        <div class="grid-2">
          <div class="card section">
            <h2>Alertă rapidă</h2>
            <div class="desc">Cine este eligibil și cine mai are pași de făcut</div>
            ${enriched.map(member => `
              <div class="member-box">
                <div class="row">
                  <div>
                    <strong>${member.name}</strong>
                    <div class="badges">
                      <span class="badge">${member.rank}</span>
                      <span class="badge ${member.evaluation.eligible ? "ok" : "warn"}">${member.evaluation.eligible ? "Eligibil" : "În progres"}</span>
                    </div>
                    <div class="small" style="margin-top:8px">Următorul grad: <strong style="color:var(--text)">${member.evaluation.next}</strong></div>
                  </div>
                  <div class="progress-wrap">
                    <div class="row small"><span>Progres</span><span>${member.evaluation.progress}%</span></div>
                    <div class="progress"><span style="width:${member.evaluation.progress}%"></span></div>
                  </div>
                </div>
                ${!member.evaluation.eligible ? `<div class="badges">${member.evaluation.missing.slice(0,4).map(item => `<span class="badge">${item}</span>`).join("")}</div>` : ""}
              </div>
            `).join("")}
          </div>
          <div class="card section">
            <h2>Top săptămânal</h2>
            <div class="desc">Clasament rapid pe săptămâna ${latestWeek || "—"}</div>
            ${weekly.length ? weekly.map((entry, index) => `
              <div class="list-item row">
                <div>
                  <strong>#${index + 1} ${entry.name}</strong>
                  <div class="small">Săptămâna ${latestWeek}</div>
                </div>
                <span class="badge dark">${entry.total} P</span>
              </div>
            `).join("") : `<div class="muted-box">Nu există activități încă.</div>`}
          </div>
        </div>
        <div class="grid-3">
          <div class="card section" style="grid-column: span 2;">
            <h2>Cerințe pe grade</h2>
            <div class="desc">Structurate pe aceeași pagină, pe secțiuni clare</div>
            <div class="promo-grid">
              ${Object.entries(requirements).map(([rank, data]) => `
                <div class="req-box">
                  <div class="row">
                    <div>
                      <strong>${rank}</strong>
                      <div class="small">Promovare la ${data.next}</div>
                    </div>
                    <span class="badge">${data.checks.length} cerințe</span>
                  </div>
                  <div style="margin-top:10px">
                    ${data.checks.slice(0,5).map(check => `<div class="small" style="margin-top:6px">• ${check.label}</div>`).join("")}
                    ${data.checks.length > 5 ? `<div class="small" style="margin-top:8px">+ încă ${data.checks.length - 5} cerințe</div>` : ""}
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
          <div class="card section">
            <h2>Catalog puncte</h2>
            <div class="desc">Valori rapide pentru activități</div>
            ${pointsCatalog.map(item => `
              <div class="list-item row">
                <span>${item.name}</span>
                <span class="badge">${item.points}P</span>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderMembers() {
      const enriched = getEnrichedMembers();
      document.getElementById("membri").innerHTML = `
        <div class="grid-2">
          <div class="card section">
            <h2>Listă membri</h2>
            <div class="desc">Caută, filtrează și editează statutul membrilor</div>
            <div class="filters">
              <input id="searchInput" placeholder="Caută membru..." />
              <select id="rankFilter">
                <option value="toate">Toate gradele</option>
                <option value="Șef de Tură">Șef de Tură</option>
                <option value="Supervizor">Supervizor</option>
                <option value="Manager">Manager</option>
                <option value="Asociat">Asociat</option>
              </select>
            </div>
            <div id="membersTable"></div>
          </div>
          <div class="card section">
            <h2>Adaugă membru</h2>
            <div class="desc">Completezi rapid și se salvează automat în browser</div>
            <form id="memberForm" class="form-grid">
              <div><label>Nume</label><input name="name" required placeholder="Ex: Andrei V." /></div>
              <div><label>Rang</label><select name="rank"><option>Șef de Tură</option><option>Supervizor</option><option>Manager</option><option>Asociat</option></select></div>
              <div><label>Vechime (săptămâni)</label><input type="number" name="vechime" min="0" value="0" /></div>
              <div><label>Puncte curente</label><input type="number" name="puncte" min="0" value="0" /></div>
              <div><label>Contracte</label><input type="number" name="contracte" min="0" value="0" /></div>
              <div><label>Anunțuri</label><input type="number" name="anunturi" min="0" value="0" /></div>
              <div><label>Angajări</label><input type="number" name="angajari" min="0" value="0" /></div>
              <div><label>Acțiuni ilegale</label><input type="number" name="actiuniIlegale" min="0" value="0" /></div>
              <div><label>Arme mici</label><input type="number" name="armaMica" min="0" value="0" /></div>
              <div><label>Arme mari</label><input type="number" name="armaMare" min="0" value="0" /></div>
              <div><label>Bani în bancă</label><input type="number" name="banca" min="0" value="0" /></div>
              <div><label>RF LS / HS</label><select name="rfLsHs"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>Mașină HS</label><select name="masinaHS"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>Zonă Industrială Sud</label><select name="zonaSud"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>Propunere mentor</label><select name="propunereMentor"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>Certificat locații</label><select name="certificatLocatii"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>Licență elicopter</label><select name="licentaHeli"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>Licență pilot HS</label><select name="licentaPilotHS"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>RF Extreme</label><select name="rfExtreme"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>Certificat Gunner</label><select name="certificatGunner"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>Elicopter LS</label><select name="elicopterLs"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>Propunere Belvarro</label><select name="propunereBelvarro"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div><label>Seriozitate</label><select name="seriozitate"><option value="false">Nu</option><option value="true">Da</option></select></div>
              <div style="grid-column:1/-1" class="actions-inline">
                <button class="btn-primary" type="submit">Salvează membru</button>
              </div>
            </form>
          </div>
        </div>
      `;

      function drawTable() {
        const search = document.getElementById("searchInput").value.toLowerCase();
        const rank = document.getElementById("rankFilter").value;
        const filtered = getEnrichedMembers().filter(member => {
          const matchesSearch = member.name.toLowerCase().includes(search);
          const matchesRank = rank === "toate" || member.rank === rank;
          return matchesSearch && matchesRank;
        });

        document.getElementById("membersTable").innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Nume</th><th>Rang</th><th>Puncte</th><th>Următorul grad</th><th>Progres</th><th>Status</th><th>Acțiuni</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(member => `
                <tr>
                  <td><strong>${member.name}</strong></td>
                  <td>${member.rank}</td>
                  <td>${member.puncte} P</td>
                  <td>${member.evaluation.next}</td>
                  <td><div class="progress"><span style="width:${member.evaluation.progress}%"></span></div><div class="small" style="margin-top:6px">${member.evaluation.progress}%</div></td>
                  <td><span class="badge ${member.evaluation.eligible ? "ok" : "warn"}">${member.evaluation.eligible ? "Eligibil" : "Neeligibil"}</span></td>
                  <td><button class="btn-danger delete-member" data-id="${member.id}">Șterge</button></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;

        document.querySelectorAll('.delete-member').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = Number(btn.dataset.id);
            state.members = state.members.filter(m => m.id !== id);
            state.logs = state.logs.filter(l => l.member !== filtered.find(f => f.id === id)?.name);
            saveState();
            renderApp();
          });
        });
      }

      document.getElementById("searchInput").addEventListener("input", drawTable);
      document.getElementById("rankFilter").addEventListener("change", drawTable);
      drawTable();

      document.getElementById('memberForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const member = {
          id: Date.now(),
          name: String(fd.get('name')).trim(),
          rank: fd.get('rank'),
          vechime: Number(fd.get('vechime') || 0),
          puncte: Number(fd.get('puncte') || 0),
          contracte: Number(fd.get('contracte') || 0),
          anunturi: Number(fd.get('anunturi') || 0),
          angajari: Number(fd.get('angajari') || 0),
          actiuniIlegale: Number(fd.get('actiuniIlegale') || 0),
          armaMica: Number(fd.get('armaMica') || 0),
          armaMare: Number(fd.get('armaMare') || 0),
          banca: Number(fd.get('banca') || 0),
          rfLsHs: fd.get('rfLsHs') === 'true',
          masinaHS: fd.get('masinaHS') === 'true',
          zonaSud: fd.get('zonaSud') === 'true',
          propunereMentor: fd.get('propunereMentor') === 'true',
          certificatLocatii: fd.get('certificatLocatii') === 'true',
          licentaHeli: fd.get('licentaHeli') === 'true',
          licentaPilotHS: fd.get('licentaPilotHS') === 'true',
          rfExtreme: fd.get('rfExtreme') === 'true',
          certificatGunner: fd.get('certificatGunner') === 'true',
          elicopterLs: fd.get('elicopterLs') === 'true',
          propunereBelvarro: fd.get('propunereBelvarro') === 'true',
          seriozitate: fd.get('seriozitate') === 'true',
        };
        if (!member.name) return;
        state.members.push(member);
        saveState();
        e.target.reset();
        renderApp();
        switchTab('membri');
      });
    }

    function renderPromotions() {
      const enriched = getEnrichedMembers();
      document.getElementById("promovari").innerHTML = Object.keys(requirements).map(rank => {
        const list = enriched.filter(m => m.rank === rank);
        return `
          <div class="card section" style="margin-bottom:20px;">
            <h2>${rank} → ${requirements[rank].next}</h2>
            <div class="desc">Membri grupați pe același rang, cu cerințe și status</div>
            ${list.length ? `<div class="promo-grid">
              ${list.map(member => `
                <div class="req-box">
                  <div class="row">
                    <div>
                      <strong>${member.name}</strong>
                      <div class="small">${member.rank} • ${member.evaluation.progress}% progres</div>
                    </div>
                    <span class="badge ${member.evaluation.eligible ? "ok" : "warn"}">${member.evaluation.eligible ? "Eligibil" : "În lucru"}</span>
                  </div>
                  <div style="margin-top:10px;">
                    ${member.evaluation.checks.map(check => `
                      <div class="check-row">
                        <span>${check.label}</span>
                        <span class="badge ${check.ok ? "ok" : "warn"}">${check.ok ? "OK" : "Lipsește"}</span>
                      </div>
                    `).join("")}
                  </div>
                </div>
              `).join("")}
            </div>` : `<div class="muted-box">Nu există membri pe acest grad.</div>`}
          </div>
        `;
      }).join("");
    }

    function renderActivities() {
      document.getElementById("activitati").innerHTML = `
        <div class="grid-2">
          <div class="card section">
            <h2>Log activități</h2>
            <div class="desc">Un singur istoric pentru toate săptămânile</div>
            ${state.logs.length ? `<table>
              <thead>
                <tr><th>Data</th><th>Săpt.</th><th>Membru</th><th>Activitate</th><th>Cant.</th><th>Total</th><th>Acțiuni</th></tr>
              </thead>
              <tbody>
                ${state.logs.slice().sort((a,b) => b.id - a.id).map(log => `
                  <tr>
                    <td>${log.date}</td>
                    <td>${log.week}</td>
                    <td>${log.member}</td>
                    <td>${log.activity}</td>
                    <td>${log.qty}</td>
                    <td>${log.total} P</td>
                    <td><button class="btn-danger delete-log" data-id="${log.id}">Șterge</button></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>` : `<div class="muted-box">Nu există activități încă.</div>`}
          </div>
          <div>
            <div class="card section" style="margin-bottom:20px;">
              <h2>Adaugă activitate</h2>
              <div class="desc">Punctele se calculează automat și se salvează în browser</div>
              <form id="activityForm" class="form-grid">
                <div><label>Data</label><input type="date" name="date" required /></div>
                <div><label>Săptămâna</label><input type="number" name="week" min="1" required value="11" /></div>
                <div><label>Membru</label><select name="member" id="activityMemberSelect"></select></div>
                <div><label>Activitate</label><select name="activity" id="activityTypeSelect"></select></div>
                <div><label>Cantitate</label><input type="number" name="qty" min="1" value="1" required /></div>
                <div><label>Puncte / activitate</label><input type="number" name="points" id="pointsPreview" readonly /></div>
                <div style="grid-column:1/-1" class="actions-inline">
                  <button class="btn-primary" type="submit">Salvează activitate</button>
                </div>
              </form>
            </div>
            <div class="card section">
              <h2>Salvare locală</h2>
              <div class="desc">Datele rămân pe browserul tău</div>
              <div class="info-box">Poți adăuga membri și activități fără să modifici codul.</div>
              <div class="info-box">Tot ce salvezi rămâne în browser prin localStorage.</div>
              <div class="info-box">Dacă apeși reset, revii la datele demo.</div>
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll('.delete-log').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = Number(btn.dataset.id);
          state.logs = state.logs.filter(l => l.id !== id);
          saveState();
          renderApp();
          switchTab('activitati');
        });
      });

      const memberSelect = document.getElementById('activityMemberSelect');
      const typeSelect = document.getElementById('activityTypeSelect');
      const pointsPreview = document.getElementById('pointsPreview');
      const today = new Date().toISOString().slice(0, 10);
      document.querySelector('#activityForm [name="date"]').value = today;

      memberSelect.innerHTML = state.members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
      typeSelect.innerHTML = pointsCatalog.map(item => `<option value="${item.name}">${item.name}</option>`).join('');
      pointsPreview.value = getPointsByActivity(typeSelect.value || pointsCatalog[0]?.name || '');

      typeSelect.addEventListener('change', () => {
        pointsPreview.value = getPointsByActivity(typeSelect.value);
      });

      document.getElementById('activityForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const activity = String(fd.get('activity'));
        const qty = Number(fd.get('qty') || 1);
        const points = getPointsByActivity(activity);
        const log = {
          id: Date.now(),
          date: fd.get('date'),
          week: Number(fd.get('week')),
          member: fd.get('member'),
          activity,
          qty,
          total: qty * points,
        };
        state.logs.push(log);
        const memberIndex = state.members.findIndex(m => m.name === log.member);
        if (memberIndex >= 0) {
          state.members[memberIndex].puncte = Number(state.members[memberIndex].puncte || 0) + log.total;
          if (activity === 'Contract livrare') state.members[memberIndex].contracte = Number(state.members[memberIndex].contracte || 0) + qty;
          if (activity === 'Anunț angajare') state.members[memberIndex].anunturi = Number(state.members[memberIndex].anunturi || 0) + qty;
          if (activity === 'Angajare - Caută') state.members[memberIndex].angajari = Number(state.members[memberIndex].angajari || 0) + qty;
          if (activity === 'Jaf' || activity === 'Răpire') state.members[memberIndex].actiuniIlegale = Number(state.members[memberIndex].actiuniIlegale || 0) + qty;
        }
        saveState();
        e.target.reset();
        renderApp();
        switchTab('activitati');
      });
    }

    function renderApp() {
      renderStats();
      renderDashboard();
      renderMembers();
      renderPromotions();
      renderActivities();
      initTabs();
      bindHeaderButtons();
    }

    function initTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => switchTab(btn.dataset.tab);
      });
    }

    function bindHeaderButtons() {
      document.getElementById('goActivitiesBtn').onclick = () => switchTab('activitati');
      document.getElementById('goMembersBtn').onclick = () => switchTab('membri');
      document.getElementById('resetDataBtn').onclick = () => {
        if (!confirm('Sigur vrei să revii la datele demo?')) return;
        localStorage.removeItem(STORAGE_KEY);
        state = getDefaultData();
        saveState();
        renderApp();
      };
    }

    renderApp();
  </script>
</body>
</html>
