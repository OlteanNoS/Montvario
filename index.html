<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montvario Dashboard</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --green: #059669;
      --amber: #d97706;
      --blue: #2563eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .tag {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.1;
    }

    p.sub {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, select, input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--text);
      color: white;
    }

    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .stat {
      padding: 20px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-sub {
      color: var(--muted);
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: white;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: transparent;
      color: var(--muted);
      border: 0;
      padding: 12px 16px;
      border-radius: 14px;
    }

    .tab-btn.active {
      background: #eef2ff;
      color: #1e3a8a;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1.2fr 1.2fr 0.9fr;
      gap: 20px;
    }

    .section {
      padding: 20px;
    }

    .section h2 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .section .desc {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .member-box, .list-item, .req-box, .info-box {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: #fff;
    }

    .member-box + .member-box,
    .list-item + .list-item,
    .req-box + .req-box,
    .info-box + .info-box {
      margin-top: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: #fff;
    }

    .badge.ok {
      background: #ecfdf5;
      color: var(--green);
      border-color: #a7f3d0;
    }

    .badge.warn {
      background: #fffbeb;
      color: var(--amber);
      border-color: #fde68a;
    }

    .badge.dark {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }

    .progress {
      width: 240px;
      max-width: 100%;
      height: 10px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #38bdf8);
      border-radius: 999px;
    }

    .progress-wrap {
      min-width: 240px;
    }

    .small {
      color: var(--muted);
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    th, td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    th {
      color: var(--muted);
      background: #f8fafc;
      font-weight: 600;
    }

    tr:last-child td { border-bottom: 0; }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    input, select {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 12px;
      background: white;
      min-width: 180px;
    }

    .promo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .check-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-top: 8px;
      font-size: 14px;
    }

    @media (max-width: 1100px) {
      .stats, .grid-2, .grid-3, .promo-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .container { padding: 16px; }
      h1 { font-size: 28px; }
      .stat-value { font-size: 28px; }
      .progress-wrap { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <div class="tag">Panou Montvario</div>
        <h1>Dashboard puncte, membri și promovări</h1>
        <p class="sub">Varianta simplă într-un singur fișier <strong>index.html</strong>, bună pentru GitHub Pages. Ai dashboard, membri, promovări pe grade și log de activități, fără React și fără instalări.</p>
      </div>
      <div class="actions">
        <button class="btn-primary">Adaugă activitate</button>
        <button class="btn-secondary">Adaugă membru</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="membri">Membri</button>
      <button class="tab-btn" data-tab="promovari">Promovări</button>
      <button class="tab-btn" data-tab="activitati">Activități</button>
    </div>

    <div id="dashboard" class="tab-content active"></div>
    <div id="membri" class="tab-content"></div>
    <div id="promovari" class="tab-content"></div>
    <div id="activitati" class="tab-content"></div>
  </div>

  <script>
    const requirements = {
      "Șef de Tură": {
        next: "Supervizor",
        checks: [
          { key: "vechime", label: "Minim 1 săptămână", needed: 1, type: "number" },
          { key: "contracte", label: "1 contract de livrare", needed: 1, type: "number" },
          { key: "masinaHS", label: "Mașină HS", needed: true, type: "boolean" },
          { key: "zonaSud", label: "Cunoaștere Industrială Sud", needed: true, type: "boolean" },
          { key: "anunturi", label: "3 anunțuri angajare", needed: 3, type: "number" },
          { key: "propunereMentor", label: "Propunere mentor", needed: true, type: "boolean" },
        ],
      },
      "Supervizor": {
        next: "Manager",
        checks: [
          { key: "vechime", label: "2 săptămâni vechime", needed: 2, type: "number" },
          { key: "contracte", label: "2 contracte de livrare", needed: 2, type: "number" },
          { key: "armaMica", label: "1 armă calibru mic", needed: 1, type: "number" },
          { key: "armaMare", label: "1 armă calibru mare", needed: 1, type: "number" },
          { key: "angajari", label: "1 angajare", needed: 1, type: "number" },
          { key: "anunturi", label: "3 anunțuri angajare", needed: 3, type: "number" },
          { key: "rfLsHs", label: "RF LS pe mașină HS", needed: true, type: "boolean" },
        ],
      },
      "Manager": {
        next: "Asociat",
        checks: [
          { key: "contracte", label: "6 contracte de livrare", needed: 6, type: "number" },
          { key: "armaMica", label: "2 arme calibru mic", needed: 2, type: "number" },
          { key: "armaMare", label: "2 arme calibru mare", needed: 2, type: "number" },
          { key: "angajari", label: "3 angajări", needed: 3, type: "number" },
          { key: "anunturi", label: "3 anunțuri", needed: 3, type: "number" },
          { key: "banca", label: "1M în bancă", needed: 1000000, type: "number" },
          { key: "actiuniIlegale", label: "2 acțiuni ilegale", needed: 2, type: "number" },
          { key: "certificatLocatii", label: "Certificat locații", needed: true, type: "boolean" },
          { key: "licentaHeli", label: "Licență elicopter", needed: true, type: "boolean" },
          { key: "licentaPilotHS", label: "Licență pilot HS", needed: true, type: "boolean" },
          { key: "rfExtreme", label: "RF pe mașină extreme", needed: true, type: "boolean" },
          { key: "puncte", label: "Minim 80 puncte", needed: 80, type: "number" },
        ],
      },
      "Asociat": {
        next: "Made Man",
        checks: [
          { key: "armaMica", label: "2 Tec9 FULL", needed: 2, type: "number" },
          { key: "armaMare", label: "3 AK/Advanced FULL", needed: 3, type: "number" },
          { key: "banca", label: "2M în bancă", needed: 2000000, type: "number" },
          { key: "actiuniIlegale", label: "4 acțiuni ilegale", needed: 4, type: "number" },
          { key: "angajari", label: "3 angajări", needed: 3, type: "number" },
          { key: "vechime", label: "3 săptămâni vechime", needed: 3, type: "number" },
          { key: "certificatGunner", label: "Certificat Gunner", needed: true, type: "boolean" },
          { key: "elicopterLs", label: "Elicopter LS", needed: true, type: "boolean" },
          { key: "propunereBelvarro", label: "Propunere Belvarro", needed: true, type: "boolean" },
          { key: "seriozitate", label: "Seriozitate și implicare", needed: true, type: "boolean" },
        ],
      },
    };

    const pointsCatalog = [
      ["Anunț angajare", 1],
      ["Angajare - Caută", 5],
      ["Angajare - Servită", 1],
      ["Mineriadă", 2],
      ["Rafinare", 1],
      ["Contract livrare", 2],
      ["Răpire", 5],
      ["Jaf", 10],
      ["Activitate", 1],
      ["Organizare activitate", 2],
      ["Eveniment", 1],
      ["Activitate Cayo", 1],
      ["Prezență razie Cayo", 2],
      ["Oțel", 1],
      ["Sulf", 2],
    ].map(([name, points]) => ({ name, points }));

    const members = [
      { id: 1, name: "Andrei V.", rank: "Șef de Tură", vechime: 1, contracte: 2, masinaHS: true, zonaSud: true, anunturi: 4, propunereMentor: true, angajari: 0, armaMica: 0, armaMare: 0, banca: 200000, actiuniIlegale: 1, puncte: 24, rfLsHs: false },
      { id: 2, name: "Robert M.", rank: "Supervizor", vechime: 2, contracte: 3, anunturi: 3, angajari: 1, armaMica: 1, armaMare: 1, banca: 450000, actiuniIlegale: 2, puncte: 68, rfLsHs: true },
      { id: 3, name: "Mario C.", rank: "Manager", vechime: 3, contracte: 6, anunturi: 5, angajari: 3, armaMica: 2, armaMare: 2, banca: 1250000, actiuniIlegale: 3, puncte: 89, certificatLocatii: true, licentaHeli: true, licentaPilotHS: true, rfExtreme: true },
      { id: 4, name: "Sergiu L.", rank: "Asociat", vechime: 3, contracte: 8, anunturi: 3, angajari: 4, armaMica: 2, armaMare: 3, banca: 2100000, actiuniIlegale: 5, puncte: 104, certificatGunner: true, elicopterLs: true, propunereBelvarro: true, seriozitate: true },
      { id: 5, name: "Darius P.", rank: "Manager", vechime: 2, contracte: 4, anunturi: 2, angajari: 1, armaMica: 1, armaMare: 2, banca: 650000, actiuniIlegale: 1, puncte: 53, certificatLocatii: false, licentaHeli: true, licentaPilotHS: false, rfExtreme: false },
    ];

    const logs = [
      { date: "2026-03-03", week: 10, member: "Mario C.", activity: "Jaf", qty: 1, total: 10 },
      { date: "2026-03-04", week: 10, member: "Robert M.", activity: "Contract livrare", qty: 2, total: 4 },
      { date: "2026-03-05", week: 10, member: "Sergiu L.", activity: "Răpire", qty: 2, total: 10 },
      { date: "2026-03-06", week: 10, member: "Andrei V.", activity: "Anunț angajare", qty: 3, total: 3 },
      { date: "2026-03-08", week: 10, member: "Darius P.", activity: "Activitate", qty: 5, total: 5 },
      { date: "2026-03-09", week: 11, member: "Mario C.", activity: "Jaf", qty: 1, total: 10 },
      { date: "2026-03-09", week: 11, member: "Sergiu L.", activity: "Organizare activitate", qty: 2, total: 4 },
      { date: "2026-03-09", week: 11, member: "Robert M.", activity: "Contract livrare", qty: 1, total: 2 },
    ];

    function evaluateMember(member) {
      const req = requirements[member.rank];
      if (!req) return { next: "—", eligible: false, progress: 100, missing: [], checks: [] };
      const checks = req.checks.map(check => {
        const value = member[check.key];
        const ok = check.type === "boolean" ? Boolean(value) === check.needed : Number(value || 0) >= check.needed;
        return { ...check, ok };
      });
      const passed = checks.filter(c => c.ok).length;
      return {
        next: req.next,
        eligible: checks.every(c => c.ok),
        progress: Math.round((passed / checks.length) * 100),
        missing: checks.filter(c => !c.ok).map(c => c.label),
        checks,
      };
    }

    const enrichedMembers = members.map(m => ({ ...m, evaluation: evaluateMember(m) }));

    function renderStats() {
      const eligibleCount = enrichedMembers.filter(m => m.evaluation.eligible).length;
      const atRiskCount = enrichedMembers.filter(m => m.puncte < 40).length;
      const totalPoints = enrichedMembers.reduce((sum, m) => sum + (m.puncte || 0), 0);
      const data = [
        ["Membri activi", members.length, "toți membrii înregistrați"],
        ["Eligibili acum", eligibleCount, "pot fi analizați pentru avansare"],
        ["Sub minim", atRiskCount, "au nevoie de implicare mai mare"],
        ["Puncte totale", totalPoints, "puncte adunate de toți membrii"],
      ];
      document.getElementById("stats").innerHTML = data.map(([label, value, sub]) => `
        <div class="card stat">
          <div class="stat-label">${label}</div>
          <div class="stat-value">${value}</div>
          <div class="stat-sub">${sub}</div>
        </div>
      `).join("");
    }

    function renderDashboard() {
      const leaderboard = {};
      logs.filter(l => l.week === 11).forEach(l => leaderboard[l.member] = (leaderboard[l.member] || 0) + l.total);
      const weekly = Object.entries(leaderboard).map(([name, total]) => ({ name, total })).sort((a,b) => b.total - a.total);

      document.getElementById("dashboard").innerHTML = `
        <div class="grid-2">
          <div class="card section">
            <h2>Alertă rapidă</h2>
            <div class="desc">Cine este eligibil și cine mai are pași de făcut</div>
            ${enrichedMembers.map(member => `
              <div class="member-box">
                <div class="row">
                  <div>
                    <strong>${member.name}</strong>
                    <div class="badges">
                      <span class="badge">${member.rank}</span>
                      <span class="badge ${member.evaluation.eligible ? "ok" : "warn"}">${member.evaluation.eligible ? "Eligibil" : "În progres"}</span>
                    </div>
                    <div class="small" style="margin-top:8px">Următorul grad: <strong style="color:var(--text)">${member.evaluation.next}</strong></div>
                  </div>
                  <div class="progress-wrap">
                    <div class="row small"><span>Progres</span><span>${member.evaluation.progress}%</span></div>
                    <div class="progress"><span style="width:${member.evaluation.progress}%"></span></div>
                  </div>
                </div>
                ${!member.evaluation.eligible ? `<div class="badges">${member.evaluation.missing.slice(0,4).map(item => `<span class="badge">${item}</span>`).join("")}</div>` : ""}
              </div>
            `).join("")}
          </div>
          <div class="card section">
            <h2>Top săptămânal</h2>
            <div class="desc">Clasament rapid pe săptămâna 11</div>
            ${weekly.map((entry, index) => `
              <div class="list-item row">
                <div>
                  <strong>#${index + 1} ${entry.name}</strong>
                  <div class="small">Săptămâna 11</div>
                </div>
                <span class="badge dark">${entry.total} P</span>
              </div>
            `).join("")}
          </div>
        </div>
        <div class="grid-3">
          <div class="card section" style="grid-column: span 2;">
            <h2>Cerințe pe grade</h2>
            <div class="desc">Structurate pe aceeași pagină, pe secțiuni clare</div>
            <div class="promo-grid">
              ${Object.entries(requirements).map(([rank, data]) => `
                <div class="req-box">
                  <div class="row">
                    <div>
                      <strong>${rank}</strong>
                      <div class="small">Promovare la ${data.next}</div>
                    </div>
                    <span class="badge">${data.checks.length} cerințe</span>
                  </div>
                  <div style="margin-top:10px">
                    ${data.checks.slice(0,5).map(check => `<div class="small" style="margin-top:6px">• ${check.label}</div>`).join("")}
                    ${data.checks.length > 5 ? `<div class="small" style="margin-top:8px">+ încă ${data.checks.length - 5} cerințe</div>` : ""}
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
          <div class="card section">
            <h2>Catalog puncte</h2>
            <div class="desc">Valori rapide pentru activități</div>
            ${pointsCatalog.map(item => `
              <div class="list-item row">
                <span>${item.name}</span>
                <span class="badge">${item.points}P</span>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderMembers() {
      document.getElementById("membri").innerHTML = `
        <div class="card section">
          <h2>Listă membri</h2>
          <div class="desc">Caută și filtrează după rang</div>
          <div class="filters">
            <input id="searchInput" placeholder="Caută membru..." />
            <select id="rankFilter">
              <option value="toate">Toate gradele</option>
              <option value="Șef de Tură">Șef de Tură</option>
              <option value="Supervizor">Supervizor</option>
              <option value="Manager">Manager</option>
              <option value="Asociat">Asociat</option>
            </select>
          </div>
          <div id="membersTable"></div>
        </div>
      `;

      function drawTable() {
        const search = document.getElementById("searchInput").value.toLowerCase();
        const rank = document.getElementById("rankFilter").value;
        const filtered = enrichedMembers.filter(member => {
          const matchesSearch = member.name.toLowerCase().includes(search);
          const matchesRank = rank === "toate" || member.rank === rank;
          return matchesSearch && matchesRank;
        });

        document.getElementById("membersTable").innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Nume</th>
                <th>Rang</th>
                <th>Puncte</th>
                <th>Următorul grad</th>
                <th>Progres</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(member => `
                <tr>
                  <td><strong>${member.name}</strong></td>
                  <td>${member.rank}</td>
                  <td>${member.puncte} P</td>
                  <td>${member.evaluation.next}</td>
                  <td>
                    <div class="progress"><span style="width:${member.evaluation.progress}%"></span></div>
                    <div class="small" style="margin-top:6px">${member.evaluation.progress}%</div>
                  </td>
                  <td><span class="badge ${member.evaluation.eligible ? "ok" : "warn"}">${member.evaluation.eligible ? "Eligibil" : "Neeligibil"}</span></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }

      document.getElementById("searchInput").addEventListener("input", drawTable);
      document.getElementById("rankFilter").addEventListener("change", drawTable);
      drawTable();
    }

    function renderPromotions() {
      document.getElementById("promovari").innerHTML = Object.keys(requirements).map(rank => {
        const list = enrichedMembers.filter(m => m.rank === rank);
        return `
          <div class="card section" style="margin-bottom:20px;">
            <h2>${rank} → ${requirements[rank].next}</h2>
            <div class="desc">Membri grupați pe același rang, cu cerințe și status</div>
            <div class="promo-grid">
              ${list.map(member => `
                <div class="req-box">
                  <div class="row">
                    <div>
                      <strong>${member.name}</strong>
                      <div class="small">${member.rank} • ${member.evaluation.progress}% progres</div>
                    </div>
                    <span class="badge ${member.evaluation.eligible ? "ok" : "warn"}">${member.evaluation.eligible ? "Eligibil" : "În lucru"}</span>
                  </div>
                  <div style="margin-top:10px;">
                    ${member.evaluation.checks.map(check => `
                      <div class="check-row">
                        <span>${check.label}</span>
                        <span class="badge ${check.ok ? "ok" : "warn"}">${check.ok ? "OK" : "Lipsește"}</span>
                      </div>
                    `).join("")}
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderActivities() {
      document.getElementById("activitati").innerHTML = `
        <div class="grid-2">
          <div class="card section">
            <h2>Log activități</h2>
            <div class="desc">Un singur istoric pentru toate săptămânile</div>
            <table>
              <thead>
                <tr>
                  <th>Data</th>
                  <th>Săpt.</th>
                  <th>Membru</th>
                  <th>Activitate</th>
                  <th>Cant.</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>
                ${logs.map(log => `
                  <tr>
                    <td>${log.date}</td>
                    <td>${log.week}</td>
                    <td>${log.member}</td>
                    <td>${log.activity}</td>
                    <td>${log.qty}</td>
                    <td>${log.total} P</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
          <div>
            <div class="card section" style="margin-bottom:20px;">
              <h2>De ce e bună varianta asta</h2>
              <div class="desc">Perfectă pentru GitHub Pages</div>
              <div class="info-box">Ai doar un singur fișier <strong>index.html</strong>.</div>
              <div class="info-box">Nu ai npm, React, build sau instalări.</div>
              <div class="info-box">Poți urca direct fișierul în repo.</div>
              <div class="info-box">Merge rapid pentru un panou simplu și curat.</div>
            </div>
            <div class="card section">
              <h2>Limitări</h2>
              <div class="desc">Față de varianta React</div>
              <div class="info-box">Datele sunt statice în cod până legăm un backend.</div>
              <div class="info-box">Componentele sunt mai simple.</div>
              <div class="info-box">Extinderea ulterioară e puțin mai grea.</div>
            </div>
          </div>
        </div>
      `;
    }

    function initTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.tab).classList.add('active');
        });
      });
    }

    renderStats();
    renderDashboard();
    renderMembers();
    renderPromotions();
    renderActivities();
    initTabs();
  </script>
</body>
</html>
